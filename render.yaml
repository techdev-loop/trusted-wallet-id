services:
  - type: web
    name: fiulink-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: KYC_PROVIDER
        value: none
      - key: EMAIL_PROVIDER
        value: none
      - key: JWT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_THREAD_ID
        sync: false
      - key: AES_256_KEY
        sync: false
      - key: IDENTITY_DATABASE_URL
        sync: false
      - key: WALLET_DATABASE_URL
        sync: false
